apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        {{- if .Values.podLabels }}
        {{- toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: {{ .Release.Name }}
          image: chenzhe0722/sol:auth-portal
          ports:
            - containerPort: 8443
          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.env }}
          env: {{- toYaml .Values.env | nindent 12 }}
          {{- end }}
          {{- if .Values.ssl }}
          volumeMounts:
            - name: {{ .Release.Name }}-jks
              mountPath: /root/cert
          {{- end }}
      {{- if .Values.init }}
      initContainers:
        - name: {{ .Release.Name }}-wait
          image: chenzhe0722/sol:wait
          command:
            - "wait-for"
            - "-t"
            - {{ .Values.init.timeout | quote }}
            {{- range .Values.init.wait }}
            - {{ . | quote }}
            {{- end }}
          {{- if .Values.ssl }}
          volumeMounts:
            - name: {{ .Release.Name }}-ssl
              mountPath: /root/ssl
            - name: {{ .Release.Name }}-jks
              mountPath: /root/jks
          {{- end }}
      {{- end }}
      {{- if .Values.ssl }}
      volumes:
        - name: {{ .Release.Name }}-ssl
          secret:
            secretName: {{ .Values.ssl.secretName }}
        - name: {{ .Release.Name }}-jks
          emptyDir:
            sizeLimit: 16Ki
      {{- end }}
